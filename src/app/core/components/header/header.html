<mat-toolbar color="primary" class="header-toolbar">
  <div class="logo-container" routerLink="/">
    <mat-icon class="logo-icon">content_cut</mat-icon>
    <span class="logo-text" aria-label="Tailor's FineStitch Home">Tailor's FineStitch</span>
  </div>
  <span class="spacer"></span>

  <div class="nav-links-desktop hidden-md">
    <button mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      aria-label="Home">
      Home
    </button>
    <button mat-button routerLink="/dashboard" routerLinkActive="active" aria-label="Dashboard">
      Dashboard
    </button>
    <button mat-button routerLink="/customers" routerLinkActive="active" aria-label="Customers">
      Customers
    </button>

  </div>


  <!-- Mobile Menu Button -->
  <button mat-icon-button class="mobile-menu-btn" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen()"
    aria-controls="mobile-nav" aria-label="Toggle navigation menu">
    <mat-icon>{{ isMobileMenuOpen() ? 'close' : 'menu' }}</mat-icon>
  </button>
</mat-toolbar>

<!-- Mobile Navigation Menu -->
@if (isMobileMenuOpen()) {
<nav class="mobile-nav" id="mobile-nav">
  <button mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
    (click)="closeMobileMenu()" class="mobile-nav-item">
    <mat-icon>home</mat-icon>
    <span>Home</span>
  </button>
  <button mat-button routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileMenu()"
    class="mobile-nav-item">
    <mat-icon>dashboard</mat-icon>
    <span>Dashboard</span>
  </button>
  <button mat-button routerLink="/customers" routerLinkActive="active" (click)="closeMobileMenu()"
    class="mobile-nav-item">
    <mat-icon>people</mat-icon>
    <span>Customers</span>
  </button>

</nav>
}
