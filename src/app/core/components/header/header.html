<mat-toolbar color="primary" class="header-toolbar">
  <div class="logo-container" routerLink="/">
    <mat-icon class="logo-icon">content_cut</mat-icon>
    <span class="logo-text" aria-label="Tailor's FineStitch Home">Tailor's FineStitch</span>
  </div>
  <span class="spacer"></span>

  <!-- Desktop Navigation -->
  <div class="nav-links-desktop hidden-sm">
    <button
      mat-button
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      aria-label="Home"
    >
      Home
    </button>
    <button mat-button routerLink="/dashboard" routerLinkActive="active" aria-label="Dashboard">
      Dashboard
    </button>
    <button mat-button routerLink="/customers" routerLinkActive="active" aria-label="Customers">
      Customers
    </button>
    <button mat-raised-button color="accent" routerLink="/customers/new" class="add-btn">
      <mat-icon>person_add</mat-icon>
      <span class="btn-text">Add Customer</span>
    </button>
  </div>

  <!-- Mobile Menu Button -->
  <button
    mat-icon-button
    class="mobile-menu-btn visible-sm"
    (click)="toggleMobileMenu()"
    [attr.aria-expanded]="isMobileMenuOpen()"
    aria-controls="mobile-nav"
    aria-label="Toggle navigation menu"
  >
    <mat-icon>{{ isMobileMenuOpen() ? 'close' : 'menu' }}</mat-icon>
  </button>
</mat-toolbar>

<!-- Mobile Navigation Menu -->
<nav
  class="mobile-nav"
  [class.open]="isMobileMenuOpen()"
  id="mobile-nav"
  [attr.aria-hidden]="!isMobileMenuOpen()"
>
  <button
    mat-button
    routerLink="/"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
    (click)="closeMobileMenu()"
    class="mobile-nav-item"
  >
    <mat-icon>home</mat-icon>
    <span>Home</span>
  </button>
  <button
    mat-button
    routerLink="/dashboard"
    routerLinkActive="active"
    (click)="closeMobileMenu()"
    class="mobile-nav-item"
  >
    <mat-icon>dashboard</mat-icon>
    <span>Dashboard</span>
  </button>
  <button
    mat-button
    routerLink="/customers"
    routerLinkActive="active"
    (click)="closeMobileMenu()"
    class="mobile-nav-item"
  >
    <mat-icon>people</mat-icon>
    <span>Customers</span>
  </button>
  <button
    mat-raised-button
    color="accent"
    routerLink="/customers/new"
    (click)="closeMobileMenu()"
    class="mobile-nav-item add-btn-mobile"
  >
    <mat-icon>person_add</mat-icon>
    <span>Add Customer</span>
  </button>
</nav>
